version: "2"
run:
  tests: true
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dogsled
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unused
  settings:
    dogsled:
      max-blank-identifiers: 6
    gocritic:
      disabled-checks:
        - regexpMust
        - appendAssign
        - ifElseChain
        # captLocal flags capitalized parameter names (e.g., `Cdc`, `RecordsKeeper`).
        # Renaming them across many keeper constructors is a large mechanical churn for
        # cosmetic gain, so we leave the existing names alone.
        - captLocal
    gosec:
      excludes:
        - G101
        - G107
        - G115
        - G118
        - G404
      confidence: medium
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: false
      allow-unused: false
    revive:
      rules:
        - name: redefines-builtin-id
          disabled: true
        - name: exported
          severity: error
          disabled: false
    staticcheck:
      checks:
        - all
    unused:
      local-variables-are-used: false
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        text: "ST1000:"
      - linters:
          - staticcheck
        text: "ST1003:"
      - linters:
          - staticcheck
        text: "ST1016:"
      - linters:
          - revive
        text: "or be unexported"
      - linters:
          - staticcheck
        path: migrations
        text: "SA1019:"
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.pulsar\.go$
      - deps
      - third_party
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(cosmossdk.io)
        - prefix(github.com/cosmos/cosmos-sdk)
        - prefix(github.com/Stride-Labs/stride)
      custom-order: true
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.pulsar\.go$
      - deps
      - third_party
