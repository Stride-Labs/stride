version: "2"
run:
  tests: true
  allow-parallel-runners: true

# This project is in maintenance mode (kept up to date with upstream releases),
# so the lint set is tuned to catch real bugs rather than enforce style. Pure
# style/cosmetic linters (revive doc-form, gocritic, goconst, misspell,
# copyloopvar, etc.) are intentionally not enabled, and staticcheck is filtered
# down to its bug-catching SA family plus a couple of correctness-related
# QF/ST checks.
linters:
  default: none
  enable:
    - dogsled
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - nakedret
    - nolintlint
    - staticcheck
    - thelper
    - unconvert
    - unused
  settings:
    dogsled:
      max-blank-identifiers: 6
    gosec:
      excludes:
        - G101
        - G107
        - G115
        - G118
        - G404
      confidence: medium
    nolintlint:
      require-explanation: false
      require-specific: false
      # Allow `//nolint` directives that don't end up suppressing anything (e.g.,
      # because a broader path/preset exclusion already covers the same finding).
      # Avoids forcing churn each time staticcheck or our config evolves.
      allow-unused: true
    staticcheck:
      # SA*: real-bug checks (kept). QF1009: time.Time.Equal vs == (correctness).
      # All other QF/ST/S checks are stylistic suggestions and intentionally
      # disabled to avoid churn on a maintenance project. ST1019 (duplicate
      # imports) is functionally harmless — Go accepts the same package under
      # multiple aliases — and the codebase has long-standing instances; not
      # worth a sweeping rename.
      checks:
        - "SA*"
        - "QF1009"
    unused:
      local-variables-are-used: false
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        path: migrations
        text: "SA1019:"
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.pulsar\.go$
      - deps
      - third_party
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(cosmossdk.io)
        - prefix(github.com/cosmos/cosmos-sdk)
        - prefix(github.com/Stride-Labs/stride)
      custom-order: true
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.pulsar\.go$
      - deps
      - third_party
